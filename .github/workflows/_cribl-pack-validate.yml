# Reusable: Cribl Pack Validation
# Runs shared pytest suite against caller's pack repo on ubuntu-latest.
name: _cribl-pack-validate

on:
  workflow_call:
    inputs:
      pack-type:
        description: "Pack type: edge or stream"
        required: true
        type: string
      runner_label:
        description: >-
          GitHub Actions runner label. Defaults to ubuntu-latest. Pass a
          RunsOn label (see runs-on.com/configuration/job-labels) to opt
          the calling repo into self-hosted runners.
        type: string
        required: false
        default: ubuntu-latest

concurrency:
  group: cribl-pack-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Checkout pack repo
        uses: actions/checkout@v6

      - name: Checkout shared test suite
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .github-shared
          sparse-checkout: tests/cribl-pack

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run pack validation tests
        env:
          PACK_TYPE: ${{ inputs.pack-type }}
        run: |
          pytest .github-shared/tests/cribl-pack/ -v \
            --pack-root="${GITHUB_WORKSPACE}" \
            --pack-type="${PACK_TYPE}"
