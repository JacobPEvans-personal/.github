# Reusable: Markdown Lint
# Uses the calling repo's own markdownlint config, falling back to org defaults.
name: _markdown-lint

on:
  workflow_call:
    inputs:
      runner_label:
        description: >-
          GitHub Actions runner label. Defaults to ubuntu-latest. Pass a
          RunsOn label (see runs-on.com/configuration/job-labels) to opt
          the calling repo into self-hosted runners.
        type: string
        required: false
        default: ubuntu-latest

concurrency:
  group: markdown-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Apply org-default markdownlint config
        if: hashFiles('.markdownlint-cli2.jsonc', '.markdownlint-cli2.yaml', '.markdownlint-cli2.cjs', '.markdownlint-cli2.mjs', '.markdownlint.jsonc', '.markdownlint.json', '.markdownlint.yaml', '.markdownlint.yml', '.markdownlint.cjs', '.markdownlint.mjs') == ''
        # The org-default config lives in THIS repo, not the caller's.
        # `github.repository_owner` resolves to the calling repo's owner (e.g.
        # `dryvist`), whose `.github/configs/.markdownlint-cli2.yaml` does not
        # exist, so curl returned 404 and the step failed with exit 22. Pin to
        # the home org's canonical config path.
        run: |
          curl -sSfL --retry 3 --retry-connrefused \
            "https://raw.githubusercontent.com/JacobPEvans/.github/main/configs/.markdownlint-cli2.yaml" \
            -o .markdownlint-cli2.yaml

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
            !**/node_modules/**
