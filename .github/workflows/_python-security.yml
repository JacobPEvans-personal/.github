# Python dependency vulnerability scanning via pip-audit
#
# Reusable workflow — called from repo-level ci-gate.yml files.
# Scans Python projects for known CVEs in resolved dependencies.
name: _python-security

on:
  workflow_call:
    inputs:
      python-dirs:
        description: 'Space-separated list of directories containing pyproject.toml'
        required: true
        type: string
      ignore-vulns:
        description: |
          Space-separated list of vulnerability IDs (GHSA / CVE / PYSEC) to
          skip. Use only for transitive dependencies with no available
          upstream fix; document the rationale and a tracking issue in the
          calling repo. Each ID is passed to `pip-audit --ignore-vuln`.
        required: false
        type: string
        default: ''
      runner_label:
        description: >-
          GitHub Actions runner label. Defaults to ubuntu-latest. Pass a
          RunsOn label (see runs-on.com/configuration/job-labels) to opt
          the calling repo into self-hosted runners.
        type: string
        required: false
        default: ubuntu-latest

concurrency:
  group: python-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ${{ inputs.runner_label }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Checkout central scripts
        uses: actions/checkout@v6
        with:
          # This reusable workflow's scripts live in THIS repo, not the
          # caller's. `github.repository_owner` resolves to the calling repo's
          # owner (e.g. `dryvist`), whose `.github` has no `scripts/` dir, so
          # the sparse-checkout produced an empty path and the audit step
          # failed with exit 127 (script not found). Pin to the home org.
          repository: JacobPEvans/.github
          path: .central-config
          sparse-checkout: scripts/run-pip-audit.sh
          sparse-checkout-cone-mode: false

      - name: Audit Python dependencies
        env:
          PYTHON_DIRS: ${{ inputs.python-dirs }}
          IGNORE_VULNS: ${{ inputs.ignore-vulns }}
        run: bash "$GITHUB_WORKSPACE/.central-config/scripts/run-pip-audit.sh"
