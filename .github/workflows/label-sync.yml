name: Sync labels from labels.yml

on:
  push:
    branches: [main]
    paths: [.github/labels.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The canonical repo is pruned to exactly labels.yml (delete-other-labels).
  self:
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Sync labels to this repo from labels.yml
        uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: true

  # Enumerate the public repos to fan out to (this .github repo excluded).
  # Owner is JacobPEvans-personal: the bare JacobPEvans login is now an empty
  # placeholder org, so the old `gh repo list JacobPEvans` returned zero repos.
  list:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - id: list
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOW_DISPATCH }}
        run: |
          repos=$(gh repo list JacobPEvans-personal --visibility public --limit 100 --json name \
            --jq '[.[].name | select(. != ".github")]')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  # Fan out one isolated job per repo. Same trusted, pinned action as `self`,
  # retargeted by overriding GITHUB_REPOSITORY (EndBug/label-sync reads its
  # target from that env var) and authenticated with the cross-repo PAT.
  # Replaces the previous `gh label clone` loop, which deadlocked
  # (`all goroutines are asleep`) on every repo and swallowed the failure.
  # Additive by design (delete-other-labels defaults to false) to match the
  # old clone behavior; the canonical prune stays on `self`.
  sync:
    needs: list
    runs-on: ubuntu-latest
    environment: automation
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        repo: ${{ fromJSON(needs.list.outputs.repos) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Sync labels to ${{ matrix.repo }}
        uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2
        env:
          GITHUB_REPOSITORY: JacobPEvans-personal/${{ matrix.repo }}
        with:
          config-file: .github/labels.yml
          token: ${{ secrets.GH_PAT_WORKFLOW_DISPATCH }}
